             <p class="card-text">
                Elden Ring é um jogo de ação e aventura em mundo aberto desenvolvido pela FromSoftware e publicado pela Bandai Namco Entertainment. Lançado em 2022, o jogo é dirigido por Hidetaka Miyazaki, conhecido por seu trabalho em títulos como Dark Souls e Bloodborne, e conta com a colaboração do escritor George R. R. Martin, autor da série de livros "As Crônicas de Gelo e Fogo". Em Elden Ring, os jogadores exploram um vasto mundo repleto de segredos, inimigos desafiadores e uma narrativa envolvente, enquanto buscam se tornar o Elden Lord. O jogo é aclamado por sua jogabilidade desafiadora, design de mundo impressionante e narrativa intrigante. <a href="https://en.bandainamcoent.eu/elden-ring/elden-ring" target="_blank" class="botao-footer">Saiba mais</a>.
            </p>
