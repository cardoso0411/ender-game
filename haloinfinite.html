            <p class="card-text"> 
                Halo Infinite é um jogo de tiro em primeira pessoa desenvolvido pela 343 Industries e publicado pela Xbox Game Studios. Lançado em 2021, é a sexta entrada principal na série Halo e continua a história do Master Chief, um super soldado conhecido como Spartan. O jogo apresenta um mundo aberto, permitindo aos jogadores explorar o vasto ambiente do Zeta Halo, enfrentando inimigos alienígenas e completando missões para salvar a humanidade. Com gráficos impressionantes e uma jogabilidade envolvente, Halo Infinite é uma adição emocionante à franquia e tem sido amplamente elogiado por fãs e críticos. <a href="https://www.halowaypoint.com/pt-br/games/halo-infinite" target="_blank" class="botao-footer">Saiba mais</a>
